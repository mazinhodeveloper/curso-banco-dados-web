<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusão de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0"><i class="bi bi-person-plus"></i> Novo Cliente</h3>
                    </div>
                    <div class="card-body">
                        <form id="formCliente">
                            <!-- Dados Pessoais -->
                            <h5 class="border-bottom pb-2 mb-4">Dados Pessoais</h5>
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label for="nome_razao" class="form-label">Nome/Razão Social <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="nome_razao" name="nome_razao" maxlength="120" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="cpf_cnpj" class="form-label">CPF/CNPJ</label>
                                    <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj" maxlength="20">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email" name="email" maxlength="100">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="tel" class="form-control" id="telefone" name="telefone" maxlength="20">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="celular" class="form-label">Celular <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" id="celular" name="celular" maxlength="20" required>
                                </div>
                            </div>

                            <!-- Endereço -->
                            <h5 class="border-bottom pb-2 mb-4 mt-4">Endereço</h5>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="cep" class="form-label">CEP <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="cep" name="cep" maxlength="9" placeholder="00000-000" required>
                                </div>
                                <div class="col-md-5 mb-3">
                                    <label for="logradouro" class="form-label">Logradouro <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="logradouro" name="logradouro" maxlength="20" required>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label for="numero" class="form-label">Número <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="numero" name="numero" maxlength="20" required>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label for="complemento" class="form-label">Complemento <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="complemento" name="complemento" maxlength="20" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="bairro" class="form-label">Bairro <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="bairro" name="bairro" maxlength="20" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="cidade" class="form-label">Cidade <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="cidade" name="cidade" maxlength="20" required>
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label for="uf" class="form-label">UF <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="uf" name="uf" maxlength="20" style="text-transform: uppercase;" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <button type="button" class="btn btn-secondary me-md-2" onclick="window.history.back()">
                                    <i class="bi bi-arrow-left"></i> Voltar
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> Salvar Cliente
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Máscara para CEP
        document.getElementById('cep').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });

        // Auto-preenchimento ViaCEP
        document.getElementById('cep').addEventListener('blur', function() {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                const url = `https://viacep.com.br/ws/${cep}/json/`;
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.erro) {
                            document.getElementById('logradouro').value = data.logradouro || '';
                            document.getElementById('bairro').value = data.bairro || '';
                            document.getElementById('cidade').value = data.localidade || '';
                            document.getElementById('uf').value = data.uf || '';
                            document.getElementById('complemento').focus();
                        } else {
                            alert('CEP não encontrado!');
                            clearAddressFields();
                        }
                    })
                    .catch(() => {
                        alert('Erro ao consultar CEP');
                        clearAddressFields();
                    });
            }
        });

        function clearAddressFields() {
            ['logradouro', 'bairro', 'cidade', 'uf'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        // Form submit handler - Node.js backend
        document.getElementById('formCliente').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('/clientes', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erro HTTP: ' + response.status);
                }
                return response.text().then(text => {
                    try {
                        return JSON.parse(text);
                    } catch {
                        throw new Error('Resposta inválida: ' + text.substring(0,100));
                    }
                });
            })
            .then(data => {
                if (data.success) {
                    alert(data.message + '\\nID: ' + data.id);
                    this.reset();
                } else {
                    alert('Erro: ' + (data.error || 'Falha ao salvar'));
                }
            })
            .catch(err => {
                alert('Erro de conexão: ' + err);
            });
        });
    </script>
</body>
</html>
