<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Clientes - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-card { box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn-login { background: linear-gradient(45deg, #0d6efd, #6610f2); border: none; }
    </style>
</head>
<body class="bg-gradient bg-primary text-white min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="card-body p-5 text-center">
                        <i class="fas fa-users fa-3x mb-4 text-primary"></i>
                        <h2 class="fw-bold mb-4">Acesso ao Sistema</h2>
                        
                        <div id="alertLogin" class="mb-4"></div>

                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold">Usuário</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-login btn-lg w-100 mb-4 py-3 fw-bold">
                                <i class="fas fa-sign-in-alt me-2"></i>Entrar
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="mb-0">Não tem conta? 
                                <a href="usuarios_cadastro.html" class="text-decoration-none fw-bold">Cadastre-se aqui</a>
                            </p>
                            <hr class="my-3">
                            <p class="small text-muted">
                                <i>Demo: admin / admin123</i>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-login se token válido
        if (localStorage.getItem('token')) {
            window.location.href = 'clientes_principal.html';
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Entrando...';

                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', result.username);
                    window.location.href = 'clientes_principal.html';
                } else {
                    mostrarAlerta(result.erro || 'Erro no login', 'danger');
                }
            } catch (err) {
                mostrarAlerta('Servidor indisponível. Verifique se está rodando.', 'danger');
            } finally {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Entrar';
            }
        });

        function mostrarAlerta(msg, type = 'info') {
            const container = document.getElementById('alertLogin');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${msg}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>
