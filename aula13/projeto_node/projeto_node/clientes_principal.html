<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Consulta</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold text-primary">
                <i class="fas fa-users me-3"></i>
                Clientes
            </h1>
            <div class="d-flex gap-2">
                <a href="clientes_incluir.html" class="btn btn-primary btn-lg">
                    <i class="fas fa-plus me-2"></i>Novo Cliente
                </a>
                <button id="btnEncerrar" class="btn btn-danger btn-lg">
                    <i class="fas fa-power-off me-2"></i>Encerrar Sistema
                </button>
            </div>
        </div>

        <!-- Alert de carregamento/erro -->
        <div id="alertContainer"></div>

        <!-- Tabela -->
        <div class="card shadow-lg border-0">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold text-dark">
                    <i class="fas fa-list me-2 text-primary"></i>
                    Lista de Clientes
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="tabelaClientes">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>ID</th>
                                <th>Razão Social</th>
                                <th>Email</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyClientes">
                            <tr>
                                <td colspan="5" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Carregando...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Carregando clientes...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Menu -->
    <script src="menu.js"></script>
    
    <script>
        // Check auth no load
        if (!localStorage.getItem('token')) {
            alert('Acesso negado. Faça login.');
            window.location.href = 'index.html';
            throw new Error('Não autenticado');
        }

        // Função para fetch com token
        async function fetchWithToken(url, options = {}) {
            const token = localStorage.getItem('token');
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`
            };
            const response = await fetch(url, options);
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                alert('Sessão expirada. Faça login novamente.');
                window.location.href = 'index.html';
            }
            return response;
        }

        // Carregar clientes
        async function carregarClientes() {
            try {
                const response = await fetchWithToken('http://localhost:3000/clientes');
                if (!response.ok) throw new Error('Erro ao carregar');
                
                const clientes = await response.json();
                const tbody = document.getElementById('tbodyClientes');
                
                if (clientes.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                <p class="text-muted mb-0">Nenhum cliente cadastrado</p>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = clientes.map(cliente => `
                    <tr>
                        <td>${cliente.id}</td>
                        <td><strong>#${cliente.id}</strong></td>
                        <td>${cliente.razao_social}</td>
                        <td>${cliente.email}</td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <button class="btn btn-outline-primary editar-btn" data-id="${cliente.id}" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-outline-danger excluir-btn" data-id="${cliente.id}" title="Excluir">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                // Event listeners para ações
                document.querySelectorAll('.editar-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        window.location.href = `clientes_editar.html?id=${id}`;
                    });
                });

                document.querySelectorAll('.excluir-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        if (confirm(`Excluir cliente #${id}?\nRazão Social: ${btn.closest('tr').querySelector('td:nth-child(3)').textContent}`)) {
                            try {
                                const response = await fetchWithToken(`http://localhost:3000/clientes/${id}`, { method: 'DELETE' });
                                if (response.ok) {
                                    btn.closest('tr').remove();
                                    mostrarAlerta('Cliente excluído com sucesso!', 'success');
                                } else {
                                    throw new Error('Erro ao excluir');
                                }
                            } catch (error) {
                                mostrarAlerta('Erro ao excluir: ' + error.message, 'danger');
                            }
                        }
                    });
                });

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('tbodyClientes').innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-danger">
                            <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                            <h5>Erro ao carregar clientes</h5>
                            <p class="mb-0">Verifique se o servidor está rodando (porta 3000)</p>
                        </td>
                    </tr>
                `;
            }
        }

        // Mostrar alert
        function mostrarAlerta(mensagem, tipo = 'info') {
            const container = document.getElementById('alertContainer');
            const alertHtml = `
                <div class="alert alert-${tipo === 'success' ? 'success' : tipo === 'danger' ? 'danger' : 'info'} alert-dismissible fade show" role="alert">
                    ${mensagem}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            container.innerHTML = alertHtml;
        }

        // Botão encerrar sistema (logout)
        document.getElementById('btnEncerrar').addEventListener('click', () => {
            if (confirm('Deseja realmente encerrar o sistema?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        });

        // Auto-refresh a cada 30s
        setInterval(carregarClientes, 30000);

        // Load inicial
        carregarClientes();
    </script>
</body>
</html>
