<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .navbar-brand {
            font-weight: bold;
            font-size: 1.4rem;
        }
        .nav-link {
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link:focus {
            color: #0d6efd !important;
        }
        .dropdown-menu {
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .dropdown-item {
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s;
        }
        .dropdown-item:hover {
            background-color: #e9ecef;
            color: #0d6efd;
        }
        .dropdown-item.disabled {
            color: #adb5bd;
        }
        .dropdown-divider {
            margin: 0.3rem 0;
        }
        .user-badge {
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="menu.html">
                <i class="fas fa-cube me-2"></i>Sistema
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="menu.html">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="cadastrosDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-folder-open me-1"></i>Cadastros
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="cadastrosDropdown">
                            <li>
                                <a class="dropdown-item" href="clientes_principal.html">
                                    <i class="fas fa-users me-2 text-primary"></i>Clientes
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item disabled" href="#" tabindex="-1" aria-disabled="true">
                                    <i class="fas fa-truck me-2 text-muted"></i>Fornecedores
                                    <span class="badge bg-secondary ms-2 user-badge">Em breve</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle me-1"></i>
                            <span id="nomeUsuario">Usuário</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li>
                                <a class="dropdown-item text-danger" href="#" id="btnSair">
                                    <i class="fas fa-power-off me-2"></i>Sair
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <i class="fas fa-cube fa-4x text-primary mb-4"></i>
                        <h2 class="fw-bold mb-3">Bem-vindo ao Sistema</h2>
                        <p class="text-muted mb-4">Utilize o menu acima para navegar entre as opções disponíveis.</p>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="clientes_principal.html" class="btn btn-primary btn-lg px-4">
                                <i class="fas fa-users me-2"></i>Acessar Clientes
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Verificar autenticação
        (function() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (!token) {
                alert('Acesso negado. Faça login.');
                window.location.href = 'index.html';
                return;
            }
            if (user) {
                document.getElementById('nomeUsuario').textContent = user;
            }
        })();

        // Logout
        document.getElementById('btnSair').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Deseja realmente sair do sistema?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
