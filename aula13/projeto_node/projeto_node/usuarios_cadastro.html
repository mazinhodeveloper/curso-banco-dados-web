<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-4">
                        <i class="fas fa-user-plus fa-2x mb-3"></i>
                        <h3 class="mb-0">Novo Usuário</h3>
                    </div>
                    <div class="card-body p-5">
                        <div id="alertContainer"></div>
                        
                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold">Usuário *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="50">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Senha *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 py-3 mb-3 fw-bold">
                                <i class="fas fa-user-plus me-2"></i>Cadastrar
                            </button>
                            
                            <div class="text-center">
                                <a href="index.html" class="btn btn-outline-secondary w-100">
                                    <i class="fas fa-arrow-left me-2"></i>Voltar ao Login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async e => {
            e.preventDefault();
            
            if (!e.target.checkValidity()) {
                alert('Preencha todos os campos corretamente.');
                e.target.reportValidity();
                return;
            }

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Cadastrando...';

                const response = await fetch('http://localhost:3000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    mostrarAlerta(result.mensagem + '<br><small>Faça login agora.</small>', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    mostrarAlerta(result.erro, 'danger');
                }
            } catch (err) {
                mostrarAlerta('Servidor indisponível.', 'danger');
            } finally {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Cadastrar';
            }
        });

        function mostrarAlerta(html, type = 'info') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${html}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>
