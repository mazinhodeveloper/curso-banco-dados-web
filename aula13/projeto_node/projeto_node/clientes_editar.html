<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-4">
                        <i class="fas fa-user-edit fa-2x mb-3"></i>
                        <h2 class="mb-0">Editar Cliente</h2>
                    </div>
                    <div class="card-body p-5">
                        <form id="formCliente" novalidate>
                            <input type="hidden" id="clienteId" name="id">
                            
                            <h5 class="fw-bold mb-4 text-success"><i class="fas fa-building me-2"></i>Dados da Empresa</h5>
                            
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label for="razaoSocial" class="form-label">Razão Social *</label>
                                    <input type="text" class="form-control" id="razaoSocial" name="razao_social" required maxlength="255">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="cnpj" class="form-label">CNPJ *</label>
                                    <input type="text" class="form-control" id="cnpj" name="cnpj" required>
                                </div>
                            </div>

                            <h5 class="fw-bold mb-4 text-success"><i class="fas fa-map-marker-alt me-2"></i>Endereço</h5>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="cep" class="form-label">CEP *</label>
                                    <input type="text" class="form-control" id="cep" name="cep" pattern="\\d{8}" title="Digite apenas 8 dígitos" required maxlength="8">
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label for="logradouro" class="form-label">Logradouro *</label>
                                    <input type="text" class="form-control" id="logradouro" name="logradouro" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="numero" class="form-label">Nº *</label>
                                    <input type="number" class="form-control" id="numero" name="numero" min="1" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="complemento" class="form-label">Complemento</label>
                                    <input type="text" class="form-control" id="complemento" name="complemento">
                                </div>
                                <div class="col-md-5 mb-3">
                                    <label for="bairro" class="form-label">Bairro *</label>
                                    <input type="text" class="form-control" id="bairro" name="bairro" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="cidade" class="form-label">Cidade *</label>
                                    <input type="text" class="form-control" id="cidade" name="cidade" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="uf" class="form-label">UF *</label>
                                    <select class="form-select" id="uf" name="uf" required>
                                        <option value="">Selecione...</option>
                                        <option value="AC">AC</option>
                                        <option value="AL">AL</option>
                                        <option value="AP">AP</option>
                                        <option value="AM">AM</option>
                                        <option value="BA">BA</option>
                                        <option value="CE">CE</option>
                                        <option value="DF">DF</option>
                                        <option value="ES">ES</option>
                                        <option value="GO">GO</option>
                                        <option value="MA">MA</option>
                                        <option value="MT">MT</option>
                                        <option value="MS">MS</option>
                                        <option value="MG">MG</option>
                                        <option value="PA">PA</option>
                                        <option value="PB">PB</option>
                                        <option value="PR">PR</option>
                                        <option value="PE">PE</option>
                                        <option value="PI">PI</option>
                                        <option value="RJ">RJ</option>
                                        <option value="RN">RN</option>
                                        <option value="RS">RS</option>
                                        <option value="RO">RO</option>
                                        <option value="RR">RR</option>
                                        <option value="SC">SC</option>
                                        <option value="SP">SP</option>
                                        <option value="SE">SE</option>
                                        <option value="TO">TO</option>
                                    </select>
                                </div>
                            </div>

                            <h5 class="fw-bold mb-4 text-success"><i class="fas fa-phone me-2"></i>Contato</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="celular" class="form-label">Celular *</label>
                                    <input type="tel" class="form-control" id="celular" name="celular" pattern="\\(\\d{2}\\)\\s?\\d{4,5}-\\d{4}" title="Formato: (11) 99999-9999" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary me-md-2" onclick="window.location.href='clientes_principal.html'">
                                    <i class="fas fa-arrow-left me-2"></i>Cancelar
                                </button>
                                <button type="submit" class="btn btn-success btn-lg px-4">
                                    <i class="fas fa-save me-2"></i>Salvar Alterações
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu -->
    <script src="menu.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ID do cliente da URL
        const urlParams = new URLSearchParams(window.location.search);
        const clienteId = urlParams.get('id');
        
        if (!clienteId || !localStorage.getItem('token')) {
            alert('Sessão inválida.');
            window.location.href = 'index.html';
        }
        document.getElementById('clienteId').value = clienteId;

        // Carregar dados do cliente
        async function carregarCliente() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://localhost:3000/clientes/${clienteId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Cliente não encontrado');
                
                const cliente = await response.json();
                
                // Preencher formulário
                document.getElementById('razaoSocial').value = cliente.razao_social || '';
                document.getElementById('cnpj').value = cliente.cnpj || '';
                document.getElementById('cep').value = cliente.cep || '';
                document.getElementById('logradouro').value = cliente.logradouro || '';
                document.getElementById('numero').value = cliente.numero || '';
                document.getElementById('complemento').value = cliente.complemento || '';
                document.getElementById('bairro').value = cliente.bairro || '';
                document.getElementById('cidade').value = cliente.cidade || '';
                document.getElementById('uf').value = cliente.uf || '';
                document.getElementById('celular').value = cliente.celular || '';
                document.getElementById('email').value = cliente.email || '';
                
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar cliente: ' + error.message);
                window.location.href = 'clientes_principal.html';
            }
        }

        // Auto-preenchimento CEP
        document.getElementById('cep').addEventListener('blur', async function() {
            const cep = this.value.replace(/\\D/g, '');
            if (cep.length !== 8) {
                alert('CEP inválido! Digite 8 dígitos.');
                limparEndereco();
                return;
            }

            try {
                this.disabled = true;
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                if (!response.ok) throw new Error('CEP não encontrado');
                
                const data = await response.json();
                if (data.erro) throw new Error('CEP não encontrado');

                document.getElementById('logradouro').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.localidade || '';
                document.getElementById('uf').value = data.uf || '';
                
            } catch (error) {
                alert('Erro ao buscar endereço: ' + error.message);
                limparEndereco();
            } finally {
                this.disabled = false;
            }
        });

        function limparEndereco() {
            document.getElementById('logradouro').value = '';
            document.getElementById('bairro').value = '';
            document.getElementById('cidade').value = '';
            document.getElementById('uf').value = '';
        }

        // Submit formulário - UPDATE
        document.getElementById('formCliente').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // if (!this.checkValidity()) {
            //     alert('Por favor, preencha todos os campos corretamente.');
            //     this.reportValidity();
            //     return;
            // }

            const formData = new FormData(this);
            const dados = Object.fromEntries(formData);
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://localhost:3000/clientes/${clienteId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert(result.mensagem + '\nRedirecionando...');
                    setTimeout(() => window.location.href = 'clientes_principal.html', 1500);
                } else {
                    alert('Erro: ' + result.erro);
                }
            } catch (error) {
                alert('Erro de conexão. Verifique o servidor.');
            }
        });

        // Carregar ao iniciar
        carregarCliente();
    </script>
</body>
</html>
