<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - Node.js</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="mb-0">
                            <i class="bi bi-person-plus-fill me-2"></i>
                            Cadastro de Cliente
                        </h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="formCliente" novalidate>
                            <!-- [MESMO FORMULÁRIO ANTERIOR ATÉ AQUI] -->
                            <!-- ... campos do formulário igual ao anterior ... -->

                            <!-- Botões -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary me-md-2" id="btnLimpar">
                                    <i class="bi bi-arrow-clockwise me-1"></i>Limpar
                                </button>
                                <button type="submit" class="btn btn-primary btn-lg" id="btnSalvar">
                                    <i class="bi bi-check-circle-fill me-2"></i>Salvar Cliente
                                    <span class="spinner-border spinner-border-sm ms-2 d-none" id="loadingSpinner"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <script>
        $(document).ready(function() {
            // [MÁSCARAS E VIA CEP IGUAIS AO ANTERIOR]
            
            // SUBMIT ATUALIZADO PARA NODE
            $('#formCliente').on('submit', function(e) {
                e.preventDefault();
                
                if (!this.checkValidity()) {
                    $(this).addClass('was-validated');
                    return;
                }

                const btnSalvar = $('#btnSalvar');
                const spinner = $('#loadingSpinner');
                
                // Loading
                btnSalvar.prop('disabled', true);
                spinner.removeClass('d-none');

                const dadosCliente = {
                    nome_razao: $('#nome_razao').val(),
                    cpf_cnpj: $('#cpf_cnpj').val(),
                    email: $('#email').val(),
                    telefone: $('#telefone').val(),
                    celular: $('#celular').val(),
                    cep: $('#cep').val(),
                    logradouro: $('#logradouro').val(),
                    numero: $('#numero').val(),
                    complemento: $('#complemento').val(),
                    bairro: $('#bairro').val(),
                    cidade: $('#cidade').val(),
                    uf: $('#uf').val()
                };

                $.ajax({
                    url: '/api/clientes',
                    method: 'POST',
                    data: dadosCliente,
                    dataType: 'json',
                    success: function(response) {
                        if (response.success) {
                            alert(`✅ Cliente ${dadosCliente.nome_razao} cadastrado!\nID: ${response.id_cliente}`);
                            $('#formCliente')[0].reset();
                        }
                    },
                    error: function(xhr) {
                        const error = xhr.responseJSON;
                        if (error && error.errors) {
                            let msg = 'Erros:\n';
                            error.errors.forEach(e => msg += `- ${e.msg}\n`);
                            alert(msg);
                        } else {
                            alert('❌ Erro ao salvar cliente');
                        }
                    },
                    complete: function() {
                        btnSalvar.prop('disabled', false);
                        spinner.addClass('d-none');
                    }
                });
            });
        });
    </script>
</body>
</html>
